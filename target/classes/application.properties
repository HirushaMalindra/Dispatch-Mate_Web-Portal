# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── MySQL Database ────────────────────────────────────────────
# Change 'root' and 'your_password' to match your MySQL Workbench credentials
spring.datasource.url=jdbc:mysql://localhost:3306/dispatch_mate_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=0776115334@a
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# 'none' means Hibernate will NOT touch your tables — the SQL file already created them
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Session ───────────────────────────────────────────────────
# Sessions last 30 minutes of inactivity
server.servlet.session.timeout=30m
