<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Scan Token — Admin</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<div class="layout">
  <div th:replace="~{fragments/navbar-admin :: sidebar(null,'verify')}"></div>
  <div class="main">
    <div class="topbar"><span class="topbar-title">Scan / Verify Token</span></div>
    <div class="page-body">
      <div class="page-header">
        <h1>Verify Collection Token</h1>
        <p>Type or scan the student's token code to look up their reservation</p>
      </div>
      <div class="card" style="max-width:480px;">
        <form th:action="@{/admin/tokens/verify}" method="post">
          <div class="form-group">
            <label class="form-label">Token Code</label>
            <input type="text" name="tokenString" id="tokenInput"
                   class="form-control"
                   style="font-family:monospace;letter-spacing:3px;font-size:1.1rem;text-transform:uppercase;"
                   placeholder="TK-XXX-XXXXX"
                   th:value="${tokenString}" autofocus/>
            <div class="form-hint">Token codes are printed on the student's token card.</div>
            <div class="form-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>
          </div>
          <div class="flex gap-3">
            <button type="submit" class="btn btn-primary">&#128270; Look Up Token</button>
            <a href="/admin/dashboard" class="btn btn-outline">Back</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
