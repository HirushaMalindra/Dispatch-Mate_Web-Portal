<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Restock Alerts</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<div class="layout">
  <div th:replace="~{fragments/navbar-student :: sidebar(null,'alerts')}"></div>
  <div class="main">
    <div class="topbar"><span class="topbar-title">Restock Alerts</span></div>
    <div class="page-body">
      <div th:replace="~{fragments/alerts :: banners}"></div>
      <div class="page-header">
        <h1>Subscribe to Restock Alerts</h1>
        <p>We will notify you when an out-of-stock book becomes available again</p>
      </div>

      <div th:if="${outOfStockBooks.empty}" class="alert alert-success">
        <span class="alert-icon">&#10003;</span>
        All books are currently in stock — no alerts needed!
      </div>

      <div th:if="${!outOfStockBooks.empty}" class="card">
        <div class="card-header">
          <span class="card-title">Out of Stock Books</span>
          <span class="badge badge-red" th:text="${outOfStockBooks.size()} + ' books'"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Module Code</th><th>Title</th><th>Action</th></tr>
            </thead>
            <tbody>
              <tr th:each="b : ${outOfStockBooks}">
                <td><code th:text="${b.moduleCode}"></code></td>
                <td style="font-weight:500;" th:text="${b.title}"></td>
                <td>
                  <form th:action="@{/student/alerts/subscribe}" method="post"
                        style="display:inline;">
                    <input type="hidden" name="bookId" th:value="${b.bookId}"/>
                    <button type="submit" class="btn btn-primary btn-sm">
                      &#128276; Subscribe
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
