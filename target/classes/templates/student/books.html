<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Book Catalogue</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<div class="layout">
  <div th:replace="~{fragments/navbar-student :: sidebar(null,'books')}"></div>
  <div class="main">
    <div class="topbar"><span class="topbar-title">Book Catalogue</span></div>
    <div class="page-body">
      <div class="page-header">
        <h1>Course Material Catalogue</h1>
        <p>Browse all books and check availability</p>
      </div>
      <div class="search-bar">
        <form method="get" action="/student/books" style="display:flex;gap:10px;width:100%;">
          <input type="text" name="keyword" class="form-control search-input"
                 placeholder="Search by title..." th:value="${keyword}"
                 style="max-width:360px;"/>
          <button type="submit" class="btn btn-primary">Search</button>
          <a th:if="${keyword != null and !#strings.isEmpty(keyword)}"
             href="/student/books" class="btn btn-outline search-clear">Clear</a>
        </form>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">All Books</span>
          <span class="text-muted" th:text="${books.size()} + ' titles'"></span>
        </div>
        <div th:if="${books.empty}" class="text-muted text-center" style="padding:24px;">
          No books matched your search.
        </div>
        <div th:if="${!books.empty}" class="table-wrap">
          <table>
            <thead>
              <tr><th>Module Code</th><th>Title</th><th>Stock</th><th>Status</th></tr>
            </thead>
            <tbody>
              <tr th:each="b : ${books}">
                <td><code th:text="${b.moduleCode}"></code></td>
                <td style="font-weight:500;" th:text="${b.title}"></td>
                <td th:text="${b.currentStock}"></td>
                <td>
                  <span th:if="${b.currentStock > 0}" class="badge badge-green">Available</span>
                  <span th:if="${b.currentStock == 0}" class="badge badge-red">Out of Stock</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
